kind = "web"
previewPath = "/"
title = "Dreams Home"
version = "1.0.0"
id = "artifacts/dreams-home"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25030

[services.development]
run = "pnpm --filter @workspace/dreams-home run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dreams-home", "run", "build" ]
publicDir = "artifacts/dreams-home/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25030"
BASE_PATH = "/"
